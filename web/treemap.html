<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Energy Data BR — Treemap</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<style>
  :root { --bg:#0f1115; --border:#262b38; --text:#e6e8ee; --muted:#8a90a2; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--text); font-family:-apple-system,"Segoe UI",Roboto,Arial,sans-serif; }
  header { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; }
  header h1 { font-size:18px; margin:0; font-weight:600; }
  .controls { display:flex; gap:8px; align-items:center; font-size:13px; padding:10px 20px; border-bottom:1px solid var(--border); flex-wrap:wrap; }
  .controls button { background:#1d212c; border:1px solid var(--border); color:var(--text); padding:6px 12px; border-radius:6px; cursor:pointer; font-size:12px; }
  .controls button.active { background:#3498db; border-color:#3498db; }
  #breadcrumb { color:var(--muted); font-size:12px; }
  #breadcrumb span { cursor:pointer; color:#3498db; }
  #treemap { width:100%; height:calc(100vh - 120px); position:relative; }
  .node { position:absolute; overflow:hidden; border:1px solid #0f1115; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:2px; cursor:pointer; transition:filter .15s; }
  .node:hover { filter:brightness(1.15); }
  .node .name { font-weight:700; font-size:13px; text-align:center; line-height:1.2; }
  .node .value { font-size:11px; opacity:.85; }
  .tooltip { position:fixed; background:#1d212c; border:1px solid var(--border); border-radius:6px; padding:8px 10px; font-size:12px; pointer-events:none; display:none; z-index:10; }
  a.nav { color:#3498db; text-decoration:none; font-size:13px; }
  .loading { color:var(--muted); padding:40px; text-align:center; }
</style>
</head>
<body>
<header>
  <div>
    <h1>🗺️ Energy Data BR — Treemap</h1>
    <div id="breadcrumb">Brasil</div>
  </div>
  <a class="nav" href="/dashboard">← Ver Dashboard</a>
</header>
<div class="controls">
  <span style="color:var(--muted)">Agrupar por:</span>
  <button data-nivel="uf_fonte" class="active">UF → Fonte</button>
  <button data-nivel="fonte">Só Fonte</button>
  <button data-nivel="uf">Só UF</button>
</div>
<div id="treemap"><div class="loading">Carregando treemap…</div></div>
<div class="tooltip" id="tooltip"></div>
<script>
const CORES = ['#2ecc71','#3498db','#f1c40f','#e67e22','#9b59b6','#1abc9c','#e74c3c','#95a5a6','#16a085','#2980b9'];
const container = document.getElementById('treemap');
const tooltip = document.getElementById('tooltip');
const breadcrumb = document.getElementById('breadcrumb');
let nivelAtual = 'uf_fonte';
let ufAberta = null;

function corPara(nome) {
  let hash = 0;
  for (let i=0;i<nome.length;i++) hash = nome.charCodeAt(i) + ((hash<<5)-hash);
  return CORES[Math.abs(hash) % CORES.length];
}
function formatarKw(v) {
  if (v >= 1e6) return (v/1e6).toFixed(1) + ' GW';
  if (v >= 1e3) return (v/1e3).toFixed(1) + ' MW';
  return v.toFixed(0) + ' kW';
}

function desenhar(data) {
  container.innerHTML = '';
  const w = container.clientWidth, h = container.clientHeight;
  const root = d3.hierarchy(data).sum(d=>d.value||0).sort((a,b)=>b.value-a.value);
  d3.treemap().size([w,h]).paddingInner(2).paddingOuter(2)(root);
  const nodes = root.leaves();

  nodes.forEach(d => {
    const el = document.createElement('div');
    el.className = 'node';
    const largura = d.x1-d.x0, altura = d.y1-d.y0;
    el.style.left = d.x0+'px'; el.style.top = d.y0+'px';
    el.style.width = largura+'px'; el.style.height = altura+'px';
    el.style.background = corPara(d.parent && d.parent.data.name!=='Brasil' ? d.parent.data.name : d.data.name);

    if (largura>40 && altura>24) {
      el.innerHTML = `<div class="name" style="font-size:${Math.min(16,Math.max(9,largura/8))}px">${d.data.name}</div><div class="value">${formatarKw(d.value)}</div>`;
    }
    el.addEventListener('mousemove', (ev) => {
      tooltip.style.display='block'; tooltip.style.left=(ev.clientX+12)+'px'; tooltip.style.top=(ev.clientY+12)+'px';
      tooltip.innerHTML = `<b>${d.data.name}</b><br>${formatarKw(d.value)}${d.data.empreendimentos?'<br>'+d.data.empreendimentos.toLocaleString('pt-BR')+' empreendimentos':''}`;
    });
    el.addEventListener('mouseleave', () => tooltip.style.display='none');

    if (nivelAtual==='uf_fonte' && d.parent && d.parent.data.name!=='Brasil') el.addEventListener('click', () => abrirUF(d.parent.data.name));
    else if (nivelAtual==='uf') el.addEventListener('click', () => abrirUF(d.data.name));

    container.appendChild(el);
  });
}

async function carregarBrasil(nivel) {
  container.innerHTML = '<div class="loading">Carregando…</div>';
  breadcrumb.innerHTML = 'Brasil';
  try {
    const r = await fetch(`/treemap/brasil?nivel=${nivel}`);
    if (!r.ok) throw new Error('status '+r.status);
    desenhar(await r.json());
  } catch (e) { container.innerHTML = `<div class="loading">Erro: ${e.message}</div>`; }
}

async function abrirUF(uf) {
  ufAberta = uf;
  container.innerHTML = '<div class="loading">Carregando '+uf+'…</div>';
  breadcrumb.innerHTML = `<span onclick="voltarBrasil()">Brasil</span> / ${uf}`;
  try {
    const r = await fetch(`/treemap/uf/${uf}?limit=100`);
    if (!r.ok) throw new Error('status '+r.status);
    desenhar(await r.json());
  } catch (e) { container.innerHTML = `<div class="loading">Erro: ${e.message}</div>`; }
}
function voltarBrasil() { ufAberta = null; carregarBrasil(nivelAtual); }

document.querySelectorAll('.controls button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.controls button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    nivelAtual = btn.dataset.nivel; ufAberta = null;
    carregarBrasil(nivelAtual);
  });
});
window.addEventListener('resize', () => { if (ufAberta) abrirUF(ufAberta); else carregarBrasil(nivelAtual); });
carregarBrasil(nivelAtual);
</script>
</body>
</html>
